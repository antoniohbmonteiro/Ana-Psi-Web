name: Public Preview

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: public-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Sync public snapshot
        working-directory: apps/public
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ANA_PSI }}
        run: npm run sync:snapshot

      - name: Debug FAQ answer
        run: |
          node -e "const s=require('./apps/public/src/features/landing/data/site-public-content.snapshot.json'); const item=s.landing.faq.items.find(i=>i.question==='Qual o valor da sessão?'); console.log(item);"

      - name: Build public app
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ANA_PSI }}
        run: npm run build:public

      - name: Deploy preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ANA_PSI }}
          projectId: ana-psi
          entryPoint: apps/public
          channelId: pr-${{ github.event.pull_request.number }}
          expires: 3d
          