name: Public Production Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: public-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Sync public snapshot
        working-directory: apps/public
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ANA_PSI }}
        run: npm run sync:snapshot

      - name: Debug FAQ answer
        run: |
          node -e "const s=require('./apps/public/src/features/landing/data/site-public-content.snapshot.json'); const item=s.landing.faq.items.find(i=>i.question==='Qual o valor da sessão?'); console.log(item);"

      - name: Build public app
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ANA_PSI }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
        run: npm run build:public

      - name: Deploy to live channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ANA_PSI }}
          projectId: ana-psi
          entryPoint: apps/public
          channelId: live
          
